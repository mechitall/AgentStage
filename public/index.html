<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Stage - The Oval Office</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e1419;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        /* Signal-style layout */
        .chat-container {
            display: flex;
            height: 100vh;
        }

        /* Left sidebar */
        .sidebar {
            width: 320px;
            background: #1b2329;
            border-right: 1px solid #2d3843;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #2d3843;
        }

        .sidebar-header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .sidebar-header p {
            font-size: 14px;
            color: #8696a0;
        }

        .world-status {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(45, 56, 67, 0.3);
        }

        .status-label {
            font-size: 13px;
            color: #8696a0;
        }

        .status-value {
            font-size: 13px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .status-critical { background: #dc3545; color: white; }
        .status-warning { background: #ffc107; color: #000; }
        .status-good { background: #28a745; color: white; }
        .status-neutral { background: #495057; color: white; }

        /* Main chat area */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Chat header */
        .chat-header {
            background: #202c33;
            padding: 16px 24px;
            border-bottom: 1px solid #2d3843;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .event-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff6b6b;
        }

        .event-info h2 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .event-urgency {
            font-size: 12px;
            color: #8696a0;
        }

        /* Messages area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            background: #0e1419;
        }

        .message {
            margin-bottom: 12px;
            max-width: 70%;
        }

        .message.system {
            max-width: 100%;
            text-align: center;
            margin: 20px 0;
        }

        .system-message {
            background: rgba(134, 150, 160, 0.1);
            color: #8696a0;
            padding: 8px 16px;
            border-radius: 16px;
            display: inline-block;
            font-size: 13px;
        }

        .consequence-message {
            background: rgba(0, 168, 132, 0.1);
            color: #00a884;
            padding: 12px 16px;
            max-width: 80%;
        }

        .consequence-content {
            margin-top: 8px;
            line-height: 1.5;
        }

        .message.advisor {
            margin-left: 0;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .advisor-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            color: white;
        }

        .avatar-defense { background: #dc3545; }
        .avatar-treasury { background: #28a745; }
        .avatar-staff { background: #6f42c1; }

        .advisor-name {
            font-size: 12px;
            font-weight: 500;
            color: #8696a0;
        }

        .message-time {
            font-size: 11px;
            color: #5c6a75;
            margin-left: auto;
        }

        .message-content {
            background: #1f2c33;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            border-top-left-radius: 4px;
        }

        .message.user {
            margin-left: auto;
        }

        .message.user .message-content {
            background: #005c4b;
            border-top-right-radius: 4px;
            border-top-left-radius: 16px;
        }

        /* TTS Audio Controls */
        .audio-controls {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .play-audio-btn {
            background: #25d366;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .play-audio-btn:hover {
            background: #1eb854;
        }

        .play-audio-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .audio-status {
            margin-left: 8px;
            font-size: 12px;
            opacity: 0.8;
        }

        .audio-status .loading {
            color: #ffa500;
        }

        .audio-status .playing {
            color: #25d366;
        }

        .audio-status .error {
            color: #ff4444;
        }

        /* Input area */
        .input-area {
            background: #202c33;
            padding: 16px 24px;
            border-top: 1px solid #2d3843;
        }

        .input-container {
            background: #2a3942;
            border-radius: 24px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .decision-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
            min-height: 20px;
            resize: none;
            font-family: inherit;
        }

        .decision-input::placeholder {
            color: #8696a0;
        }

        .send-button {
            background: #00a884;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-button:hover {
            background: #009970;
        }

        .send-button:disabled {
            background: #4a5a68;
            cursor: not-allowed;
        }

        /* Start screen overlay */
        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(14, 20, 25, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .start-card {
            background: #1f2c33;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
        }

        .start-card h1 {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .start-card p {
            color: #8696a0;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .start-button {
            background: #00a884;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .start-button:hover:not(:disabled) {
            background: #009970;
        }

        .start-button:disabled {
            background: #4a5a68;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .hidden {
            display: none;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(134, 150, 160, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(134, 150, 160, 0.5);
        }

        /* Loading indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: #1f2c33;
            border-radius: 16px;
            border-top-left-radius: 4px;
            margin-bottom: 12px;
            max-width: 70%;
        }

        .typing-dots {
            display: flex;
            gap: 3px;
        }

        .typing-dot {
            width: 4px;
            height: 4px;
            background: #8696a0;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        /* Tool Results Styles */
        .tool-results {
            background: #0d1418;
            border: 1px solid #2d3843;
            border-radius: 8px;
            margin: 8px 0;
            padding: 12px;
        }

        .tool-results-header {
            font-size: 12px;
            color: #8696a0;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .tool-result {
            background: #1a2429;
            border-radius: 6px;
            margin: 6px 0;
            padding: 8px 10px;
            border-left: 3px solid #00a884;
        }

        .tool-info {
            font-size: 11px;
            color: #a8bac7;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .tool-result-preview {
            font-size: 10px;
            color: #8696a0;
            background: #0f1419;
            padding: 4px 6px;
            border-radius: 4px;
            font-family: monospace;
            word-break: break-all;
            max-height: 40px;
            overflow: hidden;
            position: relative;
        }

        .tool-result-error {
            font-size: 10px;
            color: #ff6b6b;
            background: #2d1b1b;
            padding: 4px 6px;
            border-radius: 4px;
            font-family: monospace;
        }

        .tool-result:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <!-- Start screen overlay -->
    <div id="start-overlay" class="start-overlay">
        <div class="start-card">
            <h1>🏛️ The Oval Office</h1>
            <p>Step into the role of President. Your advisors are ready to brief you on urgent matters requiring your immediate attention.</p>
            <button class="start-button" onclick="startGame()">Enter the Oval Office</button>
        </div>
    </div>

    <!-- Main chat interface -->
    <div class="chat-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🇺🇸 United States</h1>
                <p>Presidential Command</p>
            </div>
            <div class="world-status" id="world-status">
                <!-- World state will be populated here -->
            </div>
        </div>

        <!-- Main chat -->
        <div class="chat-main">
            <div class="chat-header" id="chat-header">
                <div class="event-indicator"></div>
                <div class="event-info">
                    <h2 id="event-title">Waiting for briefing...</h2>
                    <span class="event-urgency" id="event-urgency">Standing by</span>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="message system">
                    <div class="system-message">Secure connection established</div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <textarea 
                        id="decision-input" 
                        class="decision-input" 
                        placeholder="Type your decision..."
                        rows="1"
                    ></textarea>
                    <button id="send-button" class="send-button" onclick="sendDecision()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
